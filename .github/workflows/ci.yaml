name: Continuous Integration

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint:
    name: Lint Code Base with Ruff
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ruff Linter
        run: pip install ruff

      - name: Check Formatting
        run: ruff format --check backend/

      - name: Run Ruff Linter
        run: ruff check backend/

  smoke-test:
    name: Docker Smoke Test
    needs: lint
    runs-on: self-hosted

    env:
      POSTGRES_USER: viernulvier
      POSTGRES_PASSWORD: archief_test_password
      POSTGRES_DB: viernulvier_archief
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      JWT_SECRET_KEY: viernulvier_test_secret_2026_longer_for_ci_testing
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_MINUTES: 43200

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Environment
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci up -d --build --wait

      - name: Run Tests
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci exec -T backend pytest tests/

      - name: Dump Docker Logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci logs

      - name: Shut Down Docker Environment
        if: always()
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci down -v
