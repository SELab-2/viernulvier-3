name: Continuous Integration

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

# This workflow does the following:
# 1. Checks out the code.
# 2. Runs linting and formatting (used Super-Linter).
# 3. Builds the Docker environment.
# 4. Runs tests (placeholder for actual test command).
# 5. Shuts down the Docker environment.
jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          DEFAULT_BRANCH: dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CHECKOV: false

  smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: viernulvier
      POSTGRES_PASSWORD: archief_test_password
      POSTGRES_DB: viernulvier_archief
      DATABASE_HOST: database
      DATABASE_PORT: 5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Environment
        run: docker compose up -d --build --wait

      - name: Run Tests
        run: |
          # Placeholder for actual test command, e.g., pytest or npm test
          echo "Running tests..."
          sleep 10 # Simulate test duration

      - name: Dump Docker Logs
        if: failure()
        run: docker compose logs

      - name: Shut Down Docker Environment
        if: always()
        run: docker compose down -v
