name: Continuous Integration

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint-backend:
    name: Lint Backend Code Base with Ruff
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ruff Linter
        run: pip install ruff

      - name: Check Formatting
        run: ruff format --check backend/

      - name: Run Ruff Linter
        run: ruff check backend/

  lint-frontend:
    name: Lint Frontend Code Base with Prettier and Eslint
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Check Formatting
        run: npx prettier --check .
        working-directory: frontend

      - name: Run Linter check
        run: npx eslint --max-warnings=0
        working-directory: frontend

      - name: Run Typecheck
        run: npx react-router typegen && npx tsc
        working-directory: frontend

  smoke-test:
    name: Docker Smoke Test
    needs:
      - lint-backend
      - lint-frontend
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=viernulvier" > .env
          echo "POSTGRES_PASSWORD=archief_test_password" >> .env
          echo "POSTGRES_DB=viernulvier_archief" >> .env
          echo "DATABASE_HOST=database" >> .env
          echo "DATABASE_PORT=5432" >> .env
          echo "JWT_SECRET_KEY=viernulvier_test_secret_2026_longer_for_ci_testing" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "REFRESH_TOKEN_EXPIRE_MINUTES=43200" >> .env
          echo "VIERNULVIER_KEY=viernulvier_test_api_key" >> .env

      - name: Build Docker Environment
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci up -d --build --wait

      - name: Run Tests
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci exec -T backend pytest tests/

      - name: Dump Docker Logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci logs

      - name: Shut Down Docker Environment
        if: always()
        run: docker compose -f docker-compose.ci.yml --project-name viernulvier-ci down -v
