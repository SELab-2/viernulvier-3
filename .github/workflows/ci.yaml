name: Continuous Integration

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint-backend:
    name: Lint Backend Code Base with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace
        run: git clean -fdx

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ruff Linter
        run: pip install ruff

      - name: Check Formatting
        run: ruff format --check backend/

      - name: Run Ruff Linter
        run: ruff check backend/

  lint-frontend:
    name: Lint Frontend Code Base with Prettier and Eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace
        run: git clean -fdx

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Check Formatting
        run: npx prettier --check .
        working-directory: frontend

      - name: Run Linter check
        run: npx eslint --max-warnings=0
        working-directory: frontend

      - name: Run Typecheck
        run: npx react-router typegen && npx tsc
        working-directory: frontend

  smoke-test:
    name: Docker Smoke Test (${{ matrix.target }})
    needs:
      - lint-backend
      - lint-frontend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean workspace
        run: git clean -fdx

      - name: Create .env file
        run: |
          cat <<EOF > .env
          POSTGRES_USER=viernulvier
          POSTGRES_PASSWORD=archief_test_password
          POSTGRES_DB=viernulvier_archief
          DATABASE_HOST=database
          DATABASE_PORT=5432
          JWT_SECRET_KEY=viernulvier_test_secret_2026_longer_for_ci_testing
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_MINUTES=43200
          VIERNULVIER_KEY=viernulvier_test_api_key
          VITE_API_BASE_URL=http://localhost/
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_ENDPOINT=minio:9000
          MINIO_BUCKET=media
          EOF
      - name: Set project name
        run: echo "PROJECT_NAME=viernulvier-ci-${{ matrix.target }}" >> $GITHUB_ENV

      - name: Build Docker Environment
        run: docker compose -f docker-compose.ci.yml --project-name $PROJECT_NAME up -d --build --wait

      - name: Run Frontend Tests
        if: matrix.target == 'frontend'
        run: docker compose -f docker-compose.ci.yml --project-name $PROJECT_NAME run --rm frontend npm run test

      - name: Run Backend Tests
        if: matrix.target == 'backend'
        run: docker compose -f docker-compose.ci.yml --project-name $PROJECT_NAME exec -T backend pytest tests/

      - name: Dump Docker Logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml --project-name $PROJECT_NAME logs

      - name: Shut Down Docker Environment
        if: always()
        run: docker compose -f docker-compose.ci.yml --project-name $PROJECT_NAME down -v
