# Standalone on purpose: CI must not inherit local port bindings or dev volumes.
services:
  proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    # No ports exposed for CI to avoid conflicts
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: test-env
    expose:
      - "3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      target: test
    expose:
      - "8000"
    env_file: .env
    environment:
      TEST_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${POSTGRES_DB}
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
