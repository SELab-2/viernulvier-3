# Standalone dev stack, runs independently of the prod stack to prevent port errors.
# Accessible on port 2002. No TLS, no certbot, no host-exposed MinIO ports.
services:
  proxy:
    image: nginx:alpine
    ports:
      - "2002:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    expose:
      - "3000"
    env_file: .env.dev
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file: .env.dev
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:15-alpine
    env_file: .env.dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    env_file: .env.dev
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: