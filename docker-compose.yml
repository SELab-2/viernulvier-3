services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    expose:
      - "3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file: .env
    depends_on:
      database:
        condition: service_healthy

  sync_worker:
    build: ./backend
    command: python -m src.worker.sync_job
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    profiles:
      - sync

  database:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
