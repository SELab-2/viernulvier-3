services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    expose:
      - "3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy

  sync_worker:
    build: ./backend
    command: python -m src.worker.sync_job
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    profiles:
      - sync

  csv_worker:
    build: ./backend
    command: python -m src.worker.csv_parser
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    profiles:
      - csv

  database:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
