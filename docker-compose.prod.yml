# Production override: adds TLS and certificate renewal on top of the deployment stack.
# Assumes the Let's Encrypt certificates already exist; this setup renews them.
services:
  proxy:
    command: /bin/sh -c "nginx && while :; do sleep 12h; nginx -s reload; done"
    ports:
      - "443:443"
    volumes:
      - ./proxy/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  certbot-www:
  certbot-certs: